# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

  web:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
